name: ✨ 功能请求
description: 提议一个新功能或改进
labels: ['type:feat']
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      placeholder: 当前流程在哪不够好？没有这个功能时你只能怎么变通？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你希望的方案
      placeholder: 想象一个理想的解法是什么样的；UI / API 大致长什么样
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的其他方案
      placeholder: 替代方案、为什么觉得它们不够好
  - type: textarea
    id: context
    attributes:
      label: 补充
      placeholder: 截图、参考链接、相关 issue 等
