version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    labels:
      - 'type:chore'
      - 'area:deps'
    groups:
      dev-dependencies:
        dependency-type: 'development'
      production-dependencies:
        dependency-type: 'production'

  - package-ecosystem: github-actions
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: 'Asia/Shanghai'
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - 'type:ci'
      - 'area:deps'
